apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai
  namespace: solar-scope
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai
  template:
    metadata:
      labels:
        app: ai
    spec:
      containers:
        - name: ai
          image: ghcr.io/owner/repo/ai:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8005
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: solar-scope
spec:
  selector:
    app: ai
  ports:
    - port: 8005
      targetPort: 8005
