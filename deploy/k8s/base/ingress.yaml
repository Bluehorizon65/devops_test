apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: solar-scope-ingress
  namespace: solar-scope
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: nginx
  rules:
    - host: solar-scope.local
      http:
        paths:
          - path: /(.*)
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
