name: CI-CD

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main", "develop"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ${{ github.repository }}/frontend
  BACKEND_IMAGE: ${{ github.repository }}/backend
  AI_IMAGE: ${{ github.repository }}/ai

jobs:
  build:
    name: Build Stage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AI dependencies
        working-directory: AI
        run: |
          python -m pip install --upgrade pip
          pip install -r api_requirements.txt
          pip install pytest

      - name: Python compile check
        run: python -m py_compile AI/rooftop_fastapi.py

  test:
    name: Test Stage
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Backend tests
        working-directory: backend
        run: |
          npm ci
          npm test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: AI tests
        working-directory: AI
        run: |
          python -m pip install --upgrade pip
          pip install -r api_requirements.txt
          pip install pytest
          pytest -q tests

  containerize:
    name: Container Build and Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for frontend
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}

      - name: Extract metadata for backend
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}

      - name: Extract metadata for AI
        id: meta_ai
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.AI_IMAGE }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}

      - name: Build and push AI image
        uses: docker/build-push-action@v6
        with:
          context: ./AI
          push: true
          tags: ${{ steps.meta_ai.outputs.tags }}
          labels: ${{ steps.meta_ai.outputs.labels }}

  deploy:
    name: Deploy Stage
    runs-on: ubuntu-latest
    needs: containerize
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy guard
        id: guard
        run: |
          if [ -z "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "KUBE_CONFIG secret is missing. Skipping deploy stage."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup kubectl
        if: steps.guard.outputs.skip == 'false'
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        if: steps.guard.outputs.skip == 'false'
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Apply Kubernetes manifests
        if: steps.guard.outputs.skip == 'false'
        run: kubectl apply -k deploy/k8s/overlays/dev
